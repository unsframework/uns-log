# FnKit Deploy тАФ Forgejo Actions
# Builds and deploys the uns-log PostgreSQL change logger on every push to main
# Reads UNS topics from cache, logs changes to Postgres
#
# Pipeline: git push тЖТ build image тЖТ deploy container тЖТ health check
#
# Config is stored in Valkey at fnkit:config:uns-log (not S3).
# Set it with: docker exec fnkit-cache valkey-cli SET fnkit:config:uns-log '{"table":"uns_log","topics":[...]}'

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          FUNCTION_NAME="uns-log"
          IMAGE_NAME="fnkit-fn-${FUNCTION_NAME}:latest"
          IMAGE_PREV="fnkit-fn-${FUNCTION_NAME}:prev"

          echo "ЁЯФи Building ${FUNCTION_NAME}..."
          docker build -t $IMAGE_NAME .

          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "IMAGE_PREV=$IMAGE_PREV" >> $GITHUB_ENV
          echo "FUNCTION_NAME=$FUNCTION_NAME" >> $GITHUB_ENV

      - name: Deploy container
        run: |
          echo "ЁЯМР Ensuring fnkit-network exists..."
          docker network create fnkit-network 2>/dev/null || true

          # Tag current image as :prev for rollback
          docker tag $IMAGE_NAME $IMAGE_PREV 2>/dev/null || true

          echo "тЩ╗я╕П  Replacing running container..."
          docker stop $FUNCTION_NAME 2>/dev/null || true
          docker rm $FUNCTION_NAME 2>/dev/null || true

          echo "ЁЯЪА Starting ${FUNCTION_NAME}..."
          docker run -d \
            --name $FUNCTION_NAME \
            --network fnkit-network \
            --label fnkit.fn=true \
            --label fnkit.deployed="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --restart unless-stopped \
            -e FUNCTION_TARGET=uns-log \
            -e DATABASE_URL=postgres://postgres:ON9bolwhpJibSOiFcCkLWudInJNfGah1uM66e9LshLLpHX3QgGflwJmGKiRiPRAI@162.55.27.173:5434/postgres \
            -e CACHE_URL=redis://fnkit-cache:6379 \
            -e CACHE_KEY_PREFIX=uns \
            $IMAGE_NAME

      - name: Health check
        run: |
          echo "ЁЯПе Checking container health..."
          sleep 5

          if docker ps --filter "name=$FUNCTION_NAME" --filter "status=running" -q | grep -q .; then
            echo "тЬЕ ${FUNCTION_NAME} is running"
            docker logs $FUNCTION_NAME 2>&1 | tail -10
          else
            echo "тЭМ Container failed to start тАФ rolling back..."
            docker logs $FUNCTION_NAME 2>&1 || true

            # Rollback to previous image if available
            if docker image inspect $IMAGE_PREV >/dev/null 2>&1; then
              echo "ЁЯФД Rolling back to previous image..."
              docker rm $FUNCTION_NAME 2>/dev/null || true
              docker run -d \
                --name $FUNCTION_NAME \
                --network fnkit-network \
                --label fnkit.fn=true \
                --label fnkit.deployed="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                --label fnkit.rollback=true \
                --restart unless-stopped \
                -e FUNCTION_TARGET=uns-log \
                -e DATABASE_URL=postgres://postgres:ON9bolwhpJibSOiFcCkLWudInJNfGah1uM66e9LshLLpHX3QgGflwJmGKiRiPRAI@162.55.27.173:5434/postgres \
                -e CACHE_URL=redis://fnkit-cache:6379 \
                -e CACHE_KEY_PREFIX=uns \
                $IMAGE_PREV
              echo "тЪая╕П  Rolled back to previous version"
            fi
            exit 1
          fi

      - name: Cleanup old images
        run: |
          echo "ЁЯз╣ Cleaning up dangling images..."
          docker image prune -f --filter "label=fnkit.fn=true" 2>/dev/null || true
