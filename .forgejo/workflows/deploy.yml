# FnKit Deploy — Forgejo Actions
# Builds and deploys the pglog PostgreSQL change logger on every push to main
# Reads UNS topics from cache, logs changes to Postgres
#
# Pipeline: git push → build image → deploy container → health check
#
# Environment variables are passed inline (not via --env-file) because the
# Forgejo runner executes inside a container that doesn't have access to
# host filesystem paths like /opt/fnkit/pglog/.env. The docker daemon sees
# the host filesystem for --env-file, but the runner's working directory
# is inside the runner container. Using inline -e flags avoids this issue.
#
# Credentials are baked into the Dockerfile defaults or passed here.
# For production, use Forgejo secrets when available.

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          FUNCTION_NAME="pglog"
          IMAGE_NAME="fnkit-fn-${FUNCTION_NAME}:latest"
          IMAGE_PREV="fnkit-fn-${FUNCTION_NAME}:prev"

          echo "🔨 Building ${FUNCTION_NAME}..."
          docker build -t $IMAGE_NAME .

          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "IMAGE_PREV=$IMAGE_PREV" >> $GITHUB_ENV
          echo "FUNCTION_NAME=$FUNCTION_NAME" >> $GITHUB_ENV

      - name: Deploy container
        run: |
          echo "🌐 Ensuring fnkit-network exists..."
          docker network create fnkit-network 2>/dev/null || true

          # Tag current image as :prev for rollback
          docker tag $IMAGE_NAME $IMAGE_PREV 2>/dev/null || true

          echo "♻️  Replacing running container..."
          docker stop $FUNCTION_NAME 2>/dev/null || true
          docker rm $FUNCTION_NAME 2>/dev/null || true

          echo "🚀 Starting ${FUNCTION_NAME}..."
          docker run -d \
            --name $FUNCTION_NAME \
            --network fnkit-network \
            --label fnkit.fn=true \
            --label fnkit.deployed="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --restart unless-stopped \
            -e FUNCTION_TARGET=pglog \
            -e S3_ENDPOINT=https://s3.maxbain.es \
            -e S3_BUCKET=main-bucket \
            -e S3_REGION=garage \
            -e S3_ACCESS_KEY=GK3ddd42121474de13d0b77c38 \
            -e S3_SECRET_KEY=d07a992bef12da212a1b33af3792c8c03cc757f47dc895a2d7ba2ea7bbf758bd \
            -e DATABASE_URL=postgres://postgres:ON9bolwhpJibSOiFcCkLWudInJNfGah1uM66e9LshLLpHX3QgGflwJmGKiRiPRAI@162.55.27.173:5434/postgres \
            -e CACHE_URL=redis://fnkit-cache:6379 \
            -e CACHE_KEY_PREFIX=uns \
            $IMAGE_NAME

      - name: Health check
        run: |
          echo "🏥 Checking container health..."
          sleep 5

          if docker ps --filter "name=$FUNCTION_NAME" --filter "status=running" -q | grep -q .; then
            echo "✅ ${FUNCTION_NAME} is running"
            docker logs $FUNCTION_NAME 2>&1 | tail -10
          else
            echo "❌ Container failed to start — rolling back..."
            docker logs $FUNCTION_NAME 2>&1 || true

            # Rollback to previous image if available
            if docker image inspect $IMAGE_PREV >/dev/null 2>&1; then
              echo "🔄 Rolling back to previous image..."
              docker rm $FUNCTION_NAME 2>/dev/null || true
              docker run -d \
                --name $FUNCTION_NAME \
                --network fnkit-network \
                --label fnkit.fn=true \
                --label fnkit.deployed="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                --label fnkit.rollback=true \
                --restart unless-stopped \
                -e FUNCTION_TARGET=pglog \
                -e S3_ENDPOINT=https://s3.maxbain.es \
                -e S3_BUCKET=main-bucket \
                -e S3_REGION=garage \
                -e S3_ACCESS_KEY=GK3ddd42121474de13d0b77c38 \
                -e S3_SECRET_KEY=d07a992bef12da212a1b33af3792c8c03cc757f47dc895a2d7ba2ea7bbf758bd \
                -e DATABASE_URL=postgres://postgres:ON9bolwhpJibSOiFcCkLWudInJNfGah1uM66e9LshLLpHX3QgGflwJmGKiRiPRAI@162.55.27.173:5434/postgres \
                -e CACHE_URL=redis://fnkit-cache:6379 \
                -e CACHE_KEY_PREFIX=uns \
                $IMAGE_PREV
              echo "⚠️  Rolled back to previous version"
            fi
            exit 1
          fi

      - name: Cleanup old images
        run: |
          echo "🧹 Cleaning up dangling images..."
          docker image prune -f --filter "label=fnkit.fn=true" 2>/dev/null || true
