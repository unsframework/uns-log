# Docker Compose for uns-log — PostgreSQL Change Logger
# Reads UNS topic data from Valkey cache and logs changes to PostgreSQL
#
# Requires: docker network create fnkit-network
# Requires: fnkit-cache running (fnkit cache start)
# Requires: uns-framework running (populates uns:* cache keys)
# Requires: PostgreSQL accessible (external)
# Requires: Config set in Valkey (fnkit:config:<function-target>)

services:
  uns-log:
    build: .
    container_name: uns-log
    environment:
      # Function target name — also used as Valkey config key
      # e.g. uns-log → reads fnkit:config:uns-log from cache
      - FUNCTION_TARGET=uns-log
      # PostgreSQL connection (external)
      - DATABASE_URL=${DATABASE_URL:-postgres://fnkit:fnkit@fnkit-postgres:5432/fnkit?sslmode=disable}
      # Shared cache (Valkey/Redis) — also used for config storage
      - CACHE_URL=${CACHE_URL:-redis://fnkit-cache:6379}
      # Cache key prefix for UNS data (must match uns-framework)
      - CACHE_KEY_PREFIX=uns
    networks:
      - fnkit-network
    restart: unless-stopped

networks:
  fnkit-network:
    name: fnkit-network
    external: true
# Usage:
#   # First, set config in Valkey:
#   docker exec fnkit-cache valkey-cli SET fnkit:config:uns-log '{"table":"uns_log","topics":["v1.0/enterprise/site1/area1/line1/temperature"]}'
#
#   # Then start:
#   docker compose up -d
#
# Multiple instances (different equipment/lines):
#   Copy this file, change container_name and FUNCTION_TARGET:
#
#   uns-log-line1:
#     build: .
#     container_name: uns-log-line1
#     environment:
#       - FUNCTION_TARGET=uns-log-line1
#       ...
#
#   uns-log-line2:
#     build: .
#     container_name: uns-log-line2
#     environment:
#       - FUNCTION_TARGET=uns-log-line2
#       ...
#
# Each instance reads its own config from Valkey:
#   docker exec fnkit-cache valkey-cli SET fnkit:config:uns-log-line1 '{"table":"uns_log","topics":[...]}'
#   docker exec fnkit-cache valkey-cli SET fnkit:config:uns-log-line2 '{"table":"uns_log","topics":[...]}'
#
# Trigger via gateway:
#   curl -H "Authorization: Bearer <token>" http://localhost:8080/uns-log-line1
#   curl -H "Authorization: Bearer <token>" http://localhost:8080/uns-log-line2
